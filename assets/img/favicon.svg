<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Centro Hellen Keller">
  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="32" fill="#1e40af"/>

  <!-- Libro abierto (portada izquierda) -->
  <path d="M14 18 Q32 14 32 18 L32 48 Q32 44 14 48 Z" fill="#bfdbfe"/>

  <!-- Libro abierto (portada derecha) -->
  <path d="M50 18 Q32 14 32 18 L32 48 Q32 44 50 48 Z" fill="#93c5fd"/>

  <!-- Lomo del libro -->
  <line x1="32" y1="18" x2="32" y2="48" stroke="#1e40af" stroke-width="1.5"/>

  <!-- Rayos de luz (conocimiento) -->
  <line x1="32" y1="6"  x2="32" y2="12" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="9"  x2="40" y2="14" stroke="#fde68a" stroke-width="2"   stroke-linecap="round"/>
  <line x1="21" y1="9"  x2="24" y2="14" stroke="#fde68a" stroke-width="2"   stroke-linecap="round"/>

  <!-- Puntos braille en página izquierda (2x3 grid) -->
  <circle cx="20" cy="28" r="1.5" fill="#1e40af"/>
  <circle cx="25" cy="28" r="1.5" fill="#1e40af"/>
  <circle cx="20" cy="33" r="1.5" fill="#1e40af"/>
  <circle cx="25" cy="33" r="1.5" fill="#1e40af"/>
  <circle cx="20" cy="38" r="1.5" fill="#1e40af"/>
  <circle cx="25" cy="38" r="1.5" fill="#1e40af"/>
</svg>
