<!DOCTYPE html>
<html lang="es">

<head>
<!-- Metadatos y recursos globales -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Usuarios</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

<!-- Contenedor principal del modulo de usuarios -->
<div class="app-shell">
	<!-- Barra superior con marca y sesion -->
	<header class="topbar">
		<div class="logo">Centro Hellen Keller</div>
		<div class="user">Admin | <a href="index.html">Cerrar Sesión</a></div>
	</header>

	<!-- Estructura lateral de navegacion y contenido -->
	<div class="layout">
		<!-- Menu del administrador -->
		<aside class="sidebar">
			<nav>
				<ul>
					<li><a href="dashboard-admin.html">Dashboard</a></li>
					<li><a href="programas.html">Programas</a></li>
					<li><a class="active" href="usuarios.html">Usuarios</a></li>
				</ul>
			</nav>
		</aside>

		<!-- Contenido principal de gestion de usuarios -->
		<main class="contenido">
			<!-- Encabezado con titulo y accion de registro -->
			<div class="content-header">
				<h1>Gestión de Usuarios</h1>
				<button type="button" aria-label="Registrar nuevo usuario">Registrar Usuario</button>
			</div>

			<!-- Filtros y busqueda de usuarios -->
			<div class="toolbar">
				<select>
					<option>Filtrar por Rol</option>
					<option>Docente</option>
					<option>Terapeuta</option>
					<option>Encargado Legal</option>
					<option>Estudiante</option>
				</select>
				<input type="search" placeholder="Buscar">
			</div>

			<!-- Tabla de usuarios con acciones de mantenimiento -->
			<table>
				<thead>
					<tr>
						<th>Nombre</th>
						<th>Rol</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr>
						<td>Laura Pérez</td>
						<td>Docente</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button">✎</button>
							<button type="button">🗑</button>
						</td>
					</tr>

					<tr>
						<td>Carlos Gómez</td>
						<td>Terapeuta</td>
						<td>Inactivo</td>
						<td class="table-actions">
							<button type="button">✎</button>
							<button type="button">🗑</button>
						</td>
					</tr>

					<tr>
						<td>Sofía Ruiz</td>
						<td>Encargado Legal</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button" aria-label="Editar usuario Sofía Ruiz">✎</button>
							<button type="button" aria-label="Eliminar usuario Sofía Ruiz">🗑</button>
						</td>
					</tr>

					<tr>
						<td>Daniel Castro</td>
						<td>Estudiante</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button" aria-label="Editar usuario Daniel Castro">✎</button>
							<button type="button" aria-label="Eliminar usuario Daniel Castro">🗑</button>
						</td>
					</tr>
				</tbody>
			</table>
		</main>
	</div>
</div>

</body>
</html>
