<!DOCTYPE html>
<html lang="es">

<head>
<!-- Metadatos y recursos globales -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Programas</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css"><!-- Connector al CSS -->
</head>

<body>

<!-- Contenedor principal del modulo de programas -->
<div class="app-shell">
	<!-- Barra superior con marca y sesion -->
	<header class="topbar">
		<div class="logo">Centro Hellen Keller</div>
		<div class="user">Admin | <a href="index.html">Cerrar Sesión</a></div>
	</header>

	
	<div class="layout">
		<!-- Menu del administrador -->
		<aside class="sidebar">
			<nav>
				<ul> <!-- Tabla con enlace -->
					<li><a href="dashboard-admin.html">Dashboard</a></li>
					<li><a href="pei.html">Crear PEI</a></li>
					<li><a class="active" href="programas.html">Programas</a></li>
				</ul>
			</nav>
		</aside>

		<!-- Contenido principal de gestion de programas -->
		<main class="contenido">
			<!-- Encabezado con titulo -->
			<div class="content-header">
				<h1>Gestión de Programas</h1>
				<button type="button">Crear Programa</button>
			</div>

			<!-- Filtros y busqueda de programas -->
			<div class="toolbar">
				<!-- Primero se filtra por tipo y luego se puede buscar por nombre -->
				<select>
					<option>Filtrar por tipo</option>
					<option>Habilidades</option>
					<option>Académico</option>
					<option>Terapéutico</option>
				</select>
				<input type="search" placeholder="Buscar programa por nombre">
			</div>

			<!-- Tabla de programas or fila -->
			<table>
				<thead>
					<tr><!-- Encabezado tabla -->
						<th>Nombre</th>
						<th>Tipo</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr><!-- Datos de tabla -->
						<td>Terapia de Vida</td>
						<td>Habilidades</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button">Editar</button>
							<button type="button">Eliminar</button>
						</td>
					</tr>

					<tr><!-- Datos de tabla -->
						<td>Entrenamiento Sensorial</td>
						<td>Terapéutico</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button">Editar</button>
							<button type="button">Eliminar</button>
						</td>
					</tr>

					<tr><!-- Datos de tabla -->
						<td>Especial</td>
						<td>Académico</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button">Editar</button>
							<button type="button">Eliminar</button>
						</td>
					</tr>
				</tbody>
			</table>
		</main>
	</div>
</div>

</body>
</html>
