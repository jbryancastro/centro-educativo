<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Programas</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

<div class="app-shell">
	<header class="topbar">
		<div class="logo">Centro Hellen Keller</div>
		<div class="user">Admin | <a href="index.html">Cerrar Sesión</a></div>
	</header>

	<div class="layout">
		<aside class="sidebar">
			<nav>
				<ul>
					<li><a href="dashboard-admin.html">Dashboard</a></li>
					<li><a class="active" href="programas.html">Programas</a></li>
					<li><a href="usuarios.html">Usuarios</a></li>
				</ul>
			</nav>
		</aside>

		<main class="contenido">
			<div class="content-header">
				<h1>Gestión de Programas</h1>
				<button type="button" aria-label="Crear programa educativo">Crear Programa</button>
			</div>

			<div class="toolbar">
				<select>
					<option>Filtrar por Rol</option>
					<option>Habilidades</option>
					<option>Académico</option>
				</select>
				<input type="search" placeholder="Buscar">
			</div>

			<table>
				<thead>
					<tr>
						<th>Nombre</th>
						<th>Tipo</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>

				<tbody>
					<tr>
						<td>Terapia de Vida</td>
						<td>Habilidades</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button" aria-label="Editar programa Terapia de Vida">✎</button>
							<button type="button" aria-label="Eliminar programa Terapia de Vida">🗑</button>
						</td>
					</tr>

					<tr>
						<td>Entrenamiento Sensorial</td>
						<td>Terapéutico</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button" aria-label="Editar programa Entrenamiento Sensorial">✎</button>
							<button type="button" aria-label="Eliminar programa Entrenamiento Sensorial">🗑</button>
						</td>
					</tr>

					<tr>
						<td>Especial</td>
						<td>Académico</td>
						<td>Activo</td>
						<td class="table-actions">
							<button type="button" aria-label="Editar programa Especial">✎</button>
							<button type="button" aria-label="Eliminar programa Especial">🗑</button>
						</td>
					</tr>
				</tbody>
			</table>
		</main>
	</div>
</div>

</body>
</html>
