<!DOCTYPE html>
<html lang="es">

<head>
<!-- Metadatos y recursos globales -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Hellen Keller</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body class="auth-page">

<!-- Contenedor principal de autenticacion -->
<main class="login-container">
	<!-- Tarjeta de inicio de sesion -->
	<section class="login-box">
		<!-- Marca institucional -->
		<div class="panel-brand">Centro Hellen Keller</div>

		<!-- Titulo visible de la pantalla -->
		<h1>Centro Hellen Keller</h1>
		<p class="login-subtitle">Ingreso al módulo administrativo</p>

		<!-- Formulario de acceso -->
		<form action="dashboard-admin.html" method="get">
			<!-- Estos campos simulan autenticacion y redirigen al dashboard -->
			<label for="identificador">Correo electrónico o cédula</label>
			<input id="identificador" name="identificador" type="text" placeholder="Correo o Cédula" required autocomplete="username">

			<label for="clave">Contraseña</label>
			<input id="clave" name="clave" type="password" placeholder="Contraseña" required autocomplete="current-password">
			<button type="submit">Iniciar Sesión</button>
		</form>

		<!-- Acceso rapido al panel principal -->
		<nav class="quick-links">
			<!-- En un sistema real, este acceso se habilita tras validar credenciales -->
			<a href="dashboard-admin.html">Entrar como Administrador</a>
		</nav>
	</section>
</main>

</body>
</html>
