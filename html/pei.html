<!DOCTYPE html>
<html lang="es">

<head>
<!-- Metadatos y recursos globales -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de PEI</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

<!-- Contenedor principal del modulo PEI -->
<div class="app-shell">
  <!-- Barra superior con marca y sesion -->
  <header class="topbar">
    <div class="logo">Centro Hellen Keller</div>
    <div class="user">Admin | <a href="index.html">Cerrar Sesión</a></div>
  </header>

  <!-- Estructura de menu lateral y contenido -->
  <div class="layout">
    <!-- Navegacion del docente -->
    <aside class="sidebar">
      <nav>
        <ul>
          <li><a href="dashboard-admin.html">Dashboard</a></li>
          <li><a class="active" href="pei.html">Crear PEI</a></li>
          <li><a href="programas.html">Programas</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Contenido principal de creacion y seguimiento PEI -->
    <main class="contenido">
      <h1>Formulario para crear PEI</h1>

      <!-- Formulario de captura del plan educativo -->
      <form class="pei-form" action="#" method="post">
        <!-- Se usan campos basicos para practicar captura estructurada de datos -->
        <label for="estudiante">Seleccionar Estudiante</label>
        <select id="estudiante" name="estudiante" required>
          <option>Estudiante A</option>
          <option>Estudiante B</option>
          <option>Estudiante C</option>
        </select>

        <label for="objetivos">Objetivos del Plan</label>
        <input id="objetivos" name="objetivos" type="text" required>

        <label for="estrategias">Estrategias</label>
        <input id="estrategias" name="estrategias" type="text" required>

        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" name="observaciones" rows="3"></textarea>

        <label for="avance">Avance de la semana</label>
        <textarea id="avance" name="avance" rows="3"></textarea>

        <!-- Boton unico para mantener el flujo simple en esta version -->
        <button type="submit" class="full-width">Guardar</button>
      </form>
    </main>
  </div>
</div>

</body>
</html>
