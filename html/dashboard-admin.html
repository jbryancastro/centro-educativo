<!DOCTYPE html>
<html lang="es">

<head>
<!-- Metadatos y recursos globales -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Administrador</title>
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

<!-- Contenedor principal del dashboard -->
<div class="app-shell">
	<!-- Barra superior con marca y sesion -->
	<header class="topbar">
		<div class="logo">Centro Hellen Keller</div>
		<div class="user">Admin | <a href="index.html">Cerrar Sesión</a></div>
	</header>

	<!-- Estructura de menu lateral y contenido -->
	<div class="layout">
		<!-- Navegacion del modulo administrador -->
		<aside class="sidebar">
			<nav>
				<ul>
					<li><a class="active" href="dashboard-admin.html">Dashboard</a></li>
					<li><a href="pei.html">Crear PEI</a></li>
					<li><a href="programas.html">Programas</a></li>
				</ul>
			</nav>
		</aside>

		<!-- Contenido principal del dashboard -->
		<main class="contenido">
			<h1>Dashboard del Administrador</h1>

			<!-- Tarjetas de indicadores generales del módulo actual -->
			<!-- Cada tarjeta resume un dato clave para decisiones rapidas -->
			<section class="tarjetas">
				<article class="tarjeta">
					<h2>Número total de estudiantes</h2>
					<p>120</p>
				</article>

				<article class="tarjeta">
					<h2>Número total de programas activos</h2>
					<p>15</p>
				</article>

				<article class="tarjeta">
					<h2>Formularios PEI creados</h2>
					<p>34</p>
				</article>
			</section>

			<!-- Accesos directos para el flujo aprobado -->
			<section class="panel-block">
				<!-- Estos enlaces guian al usuario a los modulos solicitados en la entrega -->
				<h2>Acciones rápidas</h2>
				<p><a href="pei.html">Ir al formulario PEI</a></p>
				<p><a href="programas.html">Ir a gestión de programas</a></p>
			</section>
		</main>
	</div>
</div>

</body>
</html>
